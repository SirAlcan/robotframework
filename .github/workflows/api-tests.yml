name: API Regression Tests

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # 1) Build the list of suites to run.
  #    To add/remove a suite, edit the SUITES env var below.
  # --------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    env:
      SUITES: |
        Automation/FNB_flows.robot
        Automation/FNB_InternalID_Cases.robot
        Automation/POS_flows.robot
        Automation/Receipts_InternalID_Cases.robot
    steps:
      - uses: actions/checkout@v4

      - id: set
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          raw = os.environ.get("SUITES", "").splitlines()
          suites = [s.strip() for s in raw if s.strip()]
          missing = [s for s in suites if not os.path.isfile(s)]
          if missing:
              for m in missing:
                  print(f"ERROR: Suite not found in repo: {m}", file=sys.stderr)
              sys.exit(1)
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
              f.write("matrix=" + json.dumps({"suite": suites}) + "\n")
          print("Suites to run:")
          for s in suites:
              print(f"  - {s}")
          PYEOF

  # --------------------------------------------------------------------------
  # 2) Run each suite in its own job, in parallel.
  # --------------------------------------------------------------------------
  test:
    needs: discover
    if: needs.discover.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - id: slug
        shell: bash
        run: |
          slug=$(echo '${{ matrix.suite }}' | sed -E 's|^Automation/||; s|\.robot$||; s|[/ ]|_|g')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.suite }}
        env:
          EINVOICE_API_KEY: ${{ secrets.EINVOICE_API_KEY }}
        shell: bash
        run: |
          mkdir -p results
          robot --outputdir results \
                --output output.xml \
                --log log.html \
                --report report.html \
                "${{ matrix.suite }}"

      - name: Upload per-suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results-${{ steps.slug.outputs.slug }}
          path: results/
          retention-days: 14

  # --------------------------------------------------------------------------
  # 3) Merge all per-suite outputs and send a single email report.
  # --------------------------------------------------------------------------
  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install robotframework

      - name: Download all per-suite artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: api-results-*
          merge-multiple: false

      - name: Merge results with rebot
        id: merge
        shell: bash
        run: |
          mkdir -p combined
          python3 - <<'PYEOF'
          import glob, os, subprocess, sys
          outputs = sorted(glob.glob("artifacts/**/output.xml", recursive=True))
          if not outputs:
              print("No output.xml files found. Skipping merge.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("merged=false\n")
              sys.exit(0)
          print(f"Merging {len(outputs)} suite output(s):")
          for o in outputs:
              print(f"  - {o}")
          rc = subprocess.call([
              "rebot",
              "--name", "API Regression Suite",
              "--outputdir", "combined",
              "--output", "output.xml",
              "--log", "log.html",
              "--report", "report.html",
              *outputs,
          ])
          # rebot returns the number of failed tests; merge itself succeeded.
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("merged=true\n")
          print(f"rebot exit code: {rc}")
          PYEOF

      - name: Upload combined report
        if: steps.merge.outputs.merged == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-combined-report
          path: combined/

      - name: Build email body
        if: always()
        shell: bash
        run: |
          python3 - <<'PYEOF'
          """
          Build a structured email report from rebot's combined output.xml.

          Approach: instead of guessing error categories from string matching,
          we *parse* the assertion messages our own tests produce. The format
          we look for inside any FAIL message is the pipe-separated string
          built by helpers.py:

              <prefix> | success=<bool> | msg="<api message>" | mark=<id> | ...

          Anything we can extract is shown as labelled fields. Anything we
          can't is shown as a single 'Raw' line. Either way the email stays
          structured and predictable, no matter what new suites you add.
          """
          import os
          import re
          import xml.etree.ElementTree as ET

          OUT_XML    = 'combined/output.xml'
          EMAIL_FILE = 'email_body.txt'
          repo       = os.environ.get('GITHUB_REPOSITORY', '')
          run_id     = os.environ.get('GITHUB_RUN_ID', '')
          run_url    = f"https://github.com/{repo}/actions/runs/{run_id}"

          def write(text):
              with open(EMAIL_FILE, 'w', encoding='utf-8') as f:
                  f.write(text)

          if not os.path.exists(OUT_XML):
              write(
                  "API REGRESSION TEST REPORT\n" + "=" * 68 + "\n\n"
                  "  No combined output.xml produced.\n"
                  "  Most likely all suites failed to start (missing library,\n"
                  "  syntax error, infrastructure issue). Check the workflow logs.\n\n"
                  f"  Run URL: {run_url}\n"
              )
              raise SystemExit(0)

          tree = ET.parse(OUT_XML)
          root = tree.getroot()

          stats      = root.find('.//total/stat')
          total_pass = int(stats.get('pass', 0))
          total_fail = int(stats.get('fail', 0))
          total_skip = int(stats.get('skip', 0))
          total      = total_pass + total_fail + total_skip
          pass_pct   = round(100 * total_pass / total) if total else 0

          # ── extract structured info from assertion messages ────────────────
          # Matches every "key=value" or 'msg="..."' or 'msg=...' segment when
          # split on " | ". Tolerant to extra/missing fields.
          KV_PATTERN = re.compile(
              r'^(?P<key>[A-Za-z_][A-Za-z0-9_]*)\s*=\s*(?P<value>.*)$'
          )

          def parse_message(raw):
              """
              Parse the FAIL message into:
                {summary: 'first chunk before pipes', fields: {key: value, ...}}
              The summary captures the human-readable lead (e.g.
              "F2 step 3 (/Receipt): expected 201, got 409").
              """
              if not raw:
                  return {'summary': '', 'fields': {}}

              raw = raw.strip()
              # Strip trailing "<actual> != <expected>" appended by Should Be Equal
              raw = re.sub(r':\s*\d+\s*!=\s*\d+\s*$', '', raw)

              parts = [p.strip() for p in raw.split('|')]
              summary = parts[0] if parts else ''
              fields  = {}
              for p in parts[1:]:
                  m = KV_PATTERN.match(p)
                  if m:
                      v = m.group('value').strip()
                      if v.startswith('"') and v.endswith('"'):
                          v = v[1:-1]
                      fields[m.group('key')] = v
              return {'summary': summary, 'fields': fields}

          def extract_api_payload_from_logs(test_elem):
              """
              Walk INFO-level <msg> nodes and pick out anything that looks
              like an API response body or contains a 'message' field. This
              is a fallback when the assertion message itself is empty or
              uninformative (e.g. setup failures).
              """
              hits = []
              for msg in test_elem.iter('msg'):
                  level = msg.get('level', '')
                  text  = (msg.text or '').strip()
                  if not text:
                      continue
                  # Skip noise
                  if text.startswith('${') and ' = ' in text:
                      continue
                  # Look for response-like content
                  if (
                      'success' in text and ('True' in text or 'False' in text)
                      or "'message'" in text or '"message"' in text
                      or "'error'" in text or '"error"' in text
                      or 'msg=' in text
                  ):
                      # Truncate dicts that get printed in full
                      if len(text) > 240:
                          text = text[:240] + '…'
                      hits.append((level, text))
              return hits

          # ── collect leaf suites (those with <test> directly) ───────────────
          suites = []
          for suite in root.iter('suite'):
              tests = suite.findall('test')
              if not tests:
                  continue
              suites.append((suite.get('name') or '(unnamed)', tests))

          # ── build sections ─────────────────────────────────────────────────
          EQ  = '=' * 68
          DIV = '-' * 68

          # 1) Header
          overall = 'ALL TESTS PASSED' if total_fail == 0 else f'{total_fail} TEST(S) FAILED'
          out = [
              EQ,
              'API REGRESSION TEST REPORT',
              EQ,
              '',
              f'  Result   : {overall}',
              f'  Passed   : {total_pass} / {total}  ({pass_pct}%)',
              f'  Failed   : {total_fail}',
              f'  Skipped  : {total_skip}',
              f'  Run URL  : {run_url}',
              '',
          ]

          # 2) Suite summary (one row per .robot file)
          out += [EQ, 'SUITE SUMMARY', EQ, '']
          out.append(f'  {"Suite":<46} {"Pass":>5} {"Fail":>5} {"Skip":>5}')
          out.append(f'  {DIV[:46]} {"-"*5} {"-"*5} {"-"*5}')
          for name, tests in suites:
              p = sum(1 for t in tests if t.find('status').get('status') == 'PASS')
              f_ = sum(1 for t in tests if t.find('status').get('status') == 'FAIL')
              s = sum(1 for t in tests if t.find('status').get('status') not in ('PASS', 'FAIL'))
              tag = '   ' if f_ == 0 else 'FAIL'
              out.append(f'  {tag} {name:<42} {p:>5} {f_:>5} {s:>5}')
          out += ['']

          # 3) Failures section — the most important part
          failures = []
          for suite_name, tests in suites:
              for t in tests:
                  if t.find('status').get('status') != 'FAIL':
                      continue
                  st  = t.find('status')
                  raw = (st.text or '').strip() or (st.get('message') or '').strip()
                  parsed   = parse_message(raw)
                  api_logs = extract_api_payload_from_logs(t)
                  failures.append({
                      'suite':    suite_name,
                      'test':     t.get('name'),
                      'elapsed':  float(st.get('elapsed', 0)),
                      'summary':  parsed['summary'],
                      'fields':   parsed['fields'],
                      'raw':      raw,
                      'api_logs': api_logs,
                  })

          if failures:
              out += [EQ, f'FAILURES ({len(failures)})', EQ]
              for i, f in enumerate(failures, 1):
                  out += [
                      '',
                      f'  [{i}] {f["suite"]}  ›  {f["test"]}   ({f["elapsed"]:.2f}s)',
                      f'      ' + DIV[:62],
                  ]
                  if f['summary']:
                      out.append(f'      Summary : {f["summary"][:300]}')
                  # Render any structured fields we extracted
                  if f['fields']:
                      # Common, useful keys first; anything else after.
                      preferred = ['expected', 'got', 'success', 'msg',
                                   'message', 'mark', 'uid', 'status',
                                   'erp', 'series']
                      seen = set()
                      for key in preferred:
                          if key in f['fields']:
                              out.append(f'      {key:<8}: {f["fields"][key][:280]}')
                              seen.add(key)
                      for key, val in f['fields'].items():
                          if key not in seen:
                              out.append(f'      {key:<8}: {val[:280]}')
                  # If parsing yielded nothing, show the raw message
                  if not f['summary'] and not f['fields']:
                      out.append(f'      Raw     : {f["raw"][:400]}')
                  # If any API response was logged, surface the most useful one
                  if f['api_logs'] and 'msg' not in f['fields'] and 'message' not in f['fields']:
                      out.append('      API log :')
                      for level, text in f['api_logs'][:3]:
                          out.append(f'        [{level}] {text}')
              out += ['']

          # 4) Per-suite detailed listing (compact: passes shown, fails repeated
          #    briefly so you see context)
          out += [EQ, 'DETAILED RESULTS PER SUITE', EQ]
          for suite_name, tests in suites:
              passes = [t for t in tests if t.find('status').get('status') == 'PASS']
              fails  = [t for t in tests if t.find('status').get('status') == 'FAIL']
              skips  = [t for t in tests if t.find('status').get('status') not in ('PASS', 'FAIL')]
              status_word = 'ALL PASSING' if not fails else f'{len(fails)} FAILED'
              out += ['', DIV, f'SUITE: {suite_name}  [{status_word}]', DIV]
              if passes:
                  out.append(f'  Passed ({len(passes)}):')
                  for t in passes:
                      el = float(t.find('status').get('elapsed', 0))
                      out.append(f'    + {t.get("name")} ({el:.2f}s)')
              if fails:
                  out.append(f'  Failed ({len(fails)}):')
                  for t in fails:
                      el  = float(t.find('status').get('elapsed', 0))
                      raw = (t.find('status').text or '').strip()
                      parsed = parse_message(raw)
                      api_msg = parsed['fields'].get('msg') or parsed['fields'].get('message', '')
                      tail = f'   →  {api_msg}' if api_msg else ''
                      out.append(f'    - {t.get("name")} ({el:.2f}s){tail}')
              if skips:
                  out.append(f'  Skipped ({len(skips)}):')
                  for t in skips:
                      out.append(f'    ~ {t.get("name")}')

          out += ['', EQ, '']
          write('\n'.join(out))
          PYEOF

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3.11.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: gkazakou@impact.gr
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          subject: "API Regression Test Report - ${{ needs.test.result }}"
          body: file://email_body.txt
          attachments: combined/output.xml, combined/log.html, combined/report.html