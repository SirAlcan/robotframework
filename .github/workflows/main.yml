name: Regression Tests
on:
  push:
    branches: [ main ]  # Τρέχει όταν κάνεις push στη main
  schedule:
    - cron: '0 6 * * *'  # Αυτόματο τρέξιμο κάθε μεσάνυχτα
    - cron: '0 14 * * *'
  workflow_dispatch:      # Επιτρέπει χειροκίνητο τρέξιμο

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Robot Framework Tests
        run: |
          mkdir -p results
          robot --outputdir results Automation/Hotdog.robot
      - name: Upload Test Reports
        if: always() # Θέλουμε το report ακόμα και αν αποτύχουν τα τεστ
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-reports
          path: results/
      - name: Parse Test Results
        if: always()
        run: |
            python3 << 'EOF'
            import xml.etree.ElementTree as ET
            
            tree = ET.parse('results/output.xml')
            root = tree.getroot()
            
            stats = root.find('.//total/stat')
            total_pass = stats.get('pass')
            total_fail = stats.get('fail')
            total_skip = stats.get('skip')
            
            test_details = []
            for test in root.findall('.//test'):
             name = test.get('name')
             status = test.find('status')
             result = status.get('status')
             elapsed = float(status.get('elapsed', 0))
             elapsed_str = f"{elapsed:.2f}s"
            
             if result == 'PASS':
                 icon = '✅'
             elif result == 'FAIL':
                 icon = '❌'
             else:
                 icon = '⏭️'
            
             message = ''
             if result == 'FAIL':
                 message = f"\n      Σφάλμα: {status.get('message', 'N/A')[:200]}"
            
             test_details.append(f"  {icon} {name} ({elapsed_str}){message}")
            
            details = '\n'.join(test_details)
            
            body = f"""
            ╔══════════════════════════════════════╗
              🤖 Robot Framework Test Report
            ╚══════════════════════════════════════╝
            
            📊 ΣΥΝΟΛΙΚΑ ΑΠΟΤΕΛΕΣΜΑΤΑ:
            ✅ Passed : {total_pass}
            ❌ Failed : {total_fail}
            ⏭️ Skipped: {total_skip}
            
            📋 ΑΝΑΛΥΤΙΚΑ ΑΝΑ TEST CASE:
            {details}
            
            🔗 Πλήρες Report:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            """
            
            with open('email_body.txt', 'w', encoding='utf-8') as f:
             f.write(body)
            EOF
      - name: Read Email Body
        if: always()
        run: echo "EMAIL_BODY<<EOF" >> $GITHUB_ENV && cat email_body.txt >> $GITHUB_ENV && echo "EOF" >> $GITHUB_ENV

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
                server_address: smtp.gmail.com
                server_port: 465
                username: ${{ secrets.EMAIL_USERNAME }}
                password: ${{ secrets.EMAIL_PASSWORD }}
                to: gregkazakou@gmail.com, colleague@gmail.com
                from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
                subject: "🤖 Hotdog Test Report - ${{ job.status }}"
                body: ${{ env.EMAIL_BODY }}
                attachments: results/output.xml, results/log.html, results/report.html