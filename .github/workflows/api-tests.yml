name: API Regression Tests

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4.2.2

      - id: set
        run: bash .github/scripts/discover_api_suites.sh

  test:
    needs: discover
    if: needs.discover.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute suite slug
        id: slug
        run: |
          slug=$(echo '${{ matrix.suite }}' | sed -E 's|^Automation/||; s|\.robot$||; s|[/ ]|_|g')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.suite }}
        env:
          EINVOICE_API_KEY: ${{ secrets.EINVOICE_API_KEY }}
        run: |
          mkdir -p results
          robot --outputdir results --output output.xml --log log.html --report report.html "${{ matrix.suite }}"

      - name: Upload per-suite artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: api-results-${{ steps.slug.outputs.slug }}
          path: results/
          retention-days: 14

  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install robotframework

      - name: Download all per-suite artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: api-results-*
          merge-multiple: false

      - name: Merge results with rebot
        run: bash .github/scripts/merge_results.sh

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: api-combined-report
          path: combined/

      - name: Parse combined results
        if: always()
        run: python3 .github/scripts/build_email_body.py

      - name: Read Email Body
        if: always()
        run: |
          {
            echo "EMAIL_BODY<<EOF"
            cat email_body.txt
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3.11.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: gkazakou@impact.gr
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          subject: "🤖 API Regression Test Report - ${{ needs.test.result }}"
          body: ${{ env.EMAIL_BODY }}
          attachments: combined/output.xml, combined/log.html, combined/report.html