name: API Regression Tests

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # 1) Build the list of suites to run.
  #    To add/remove a suite, edit the SUITES env var below.
  # --------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    env:
      SUITES: |
        Automation/FNB_case_multiple_11.1.robot
        Automation/FNB_InternalID_Cases.robot
        Automation/POS_flows.robot
        Automation/Receipts_InternalID_Cases.robot
    steps:
      - uses: actions/checkout@v4

      - id: set
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          raw = os.environ.get("SUITES", "").splitlines()
          suites = [s.strip() for s in raw if s.strip()]
          missing = [s for s in suites if not os.path.isfile(s)]
          if missing:
              for m in missing:
                  print(f"ERROR: Suite not found in repo: {m}", file=sys.stderr)
              sys.exit(1)
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
              f.write("matrix=" + json.dumps({"suite": suites}) + "\n")
          print("Suites to run:")
          for s in suites:
              print(f"  - {s}")
          PYEOF

  # --------------------------------------------------------------------------
  # 2) Run each suite in its own job, in parallel.
  # --------------------------------------------------------------------------
  test:
    needs: discover
    if: needs.discover.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - id: slug
        shell: bash
        run: |
          slug=$(echo '${{ matrix.suite }}' | sed -E 's|^Automation/||; s|\.robot$||; s|[/ ]|_|g')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.suite }}
        env:
          EINVOICE_API_KEY: ${{ secrets.EINVOICE_API_KEY }}
        shell: bash
        run: |
          mkdir -p results
          robot --outputdir results \
                --output output.xml \
                --log log.html \
                --report report.html \
                "${{ matrix.suite }}"

      - name: Upload per-suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results-${{ steps.slug.outputs.slug }}
          path: results/
          retention-days: 14

  # --------------------------------------------------------------------------
  # 3) Merge all per-suite outputs and send a single email report.
  # --------------------------------------------------------------------------
  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install robotframework

      - name: Download all per-suite artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: api-results-*
          merge-multiple: false

      - name: Merge results with rebot
        id: merge
        shell: bash
        run: |
          mkdir -p combined
          python3 - <<'PYEOF'
          import glob, os, subprocess, sys
          outputs = sorted(glob.glob("artifacts/**/output.xml", recursive=True))
          if not outputs:
              print("No output.xml files found. Skipping merge.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("merged=false\n")
              sys.exit(0)
          print(f"Merging {len(outputs)} suite output(s):")
          for o in outputs:
              print(f"  - {o}")
          rc = subprocess.call([
              "rebot",
              "--name", "API Regression Suite",
              "--outputdir", "combined",
              "--output", "output.xml",
              "--log", "log.html",
              "--report", "report.html",
              *outputs,
          ])
          # rebot returns the number of failed tests; merge itself succeeded.
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("merged=true\n")
          print(f"rebot exit code: {rc}")
          PYEOF

      - name: Upload combined report
        if: steps.merge.outputs.merged == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-combined-report
          path: combined/

      - name: Build email body
        if: always()
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import os, re
          import xml.etree.ElementTree as ET
          from collections import defaultdict

          OUT_XML = 'combined/output.xml'
          EMAIL_FILE = 'email_body.txt'

          def write(text):
              with open(EMAIL_FILE, 'w', encoding='utf-8') as f:
                  f.write(text)

          if not os.path.exists(OUT_XML):
              write("No combined output.xml produced.\nCheck per-suite artifacts to see what failed.")
              raise SystemExit(0)

          tree = ET.parse(OUT_XML)
          root = tree.getroot()
          stats = root.find('.//total/stat')
          total_pass = int(stats.get('pass', 0))
          total_fail = int(stats.get('fail', 0))
          total_skip = int(stats.get('skip', 0))
          total = total_pass + total_fail + total_skip
          pass_pct = round(100 * total_pass / total) if total else 0

          repo = os.environ.get('GITHUB_REPOSITORY', '')
          run_id = os.environ.get('GITHUB_RUN_ID', '')
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          # Collect leaf suites (those that contain <test> directly)
          suites = {}
          for suite in root.iter('suite'):
              tests = suite.findall('test')
              if tests:
                  suites[suite.get('name') or '(unnamed)'] = tests

          # Classify error messages into readable categories
          def classify(msg):
              m = (msg or '').lower()
              if 'filenotfounderror' in m or 'no such file' in m:
                  return 'Missing file'
              if 'modulenotfounderror' in m or 'no module named' in m:
                  return 'Missing library'
              if '409' in m or 'already been transmitted' in m:
                  return 'UID conflict (already transmitted)'
              if '408' in m or 'timeout' in m:
                  return 'Timeout'
              if 'not authorized' in m or 'unauthorized' in m or '401' in m or '403' in m:
                  return 'Authorization error'
              if 'validation' in m or '400' in m or 'invalid' in m:
                  return 'API validation error'
              if '500' in m or 'server error' in m:
                  return 'Server error'
              if 'length of' in m or 'should be' in m or ('expected' in m and 'got' in m):
                  return 'Assertion failed'
              if 'no keyword' in m or 'create session' in m:
                  return 'Missing keyword / library'
              return 'Other error'

          EQ = '=' * 68
          SEP = '-' * 68

          # ---------- Suite summary table ----------
          suite_summary = []
          all_failures = []

          for suite_name, tests in suites.items():
              passed = [t for t in tests if t.find('status').get('status') == 'PASS']
              failed = [t for t in tests if t.find('status').get('status') == 'FAIL']
              skipped = [t for t in tests if t.find('status').get('status') not in ('PASS','FAIL')]
              icon = 'OK  ' if not failed else 'FAIL'
              suite_summary.append(
                  f"  [{icon}]  {suite_name:<44} {len(passed):>3}P  {len(failed):>3}F  {len(skipped):>3}S"
              )
              for t in failed:
                  st = t.find('status')
                  raw = (st.get('message') or '').strip() or (st.text or '').strip()
                  raw = re.sub(r'^Several failures occurred:\s*', '', raw)
                  subs = [s.strip() for s in re.split(r'\n\s*\d+\)\s+', raw) if s.strip()]
                  all_failures.append({
                      'suite': suite_name,
                      'test': t.get('name'),
                      'category': classify(raw),
                      'subs': subs or [raw],
                  })

          # ---------- Failures by category ----------
          by_cat = defaultdict(list)
          for f in all_failures:
              by_cat[f['category']].append(f)

          cat_lines = []
          for cat in sorted(by_cat):
              items = by_cat[cat]
              cat_lines.append(f"\n  {cat} ({len(items)} test(s)):")
              for it in items:
                  cat_lines.append(f"    - [{it['suite']}]  {it['test']}")

          # ---------- Detailed per-suite blocks ----------
          detail_blocks = []
          for suite_name, tests in suites.items():
              passed = [t for t in tests if t.find('status').get('status') == 'PASS']
              failed = [t for t in tests if t.find('status').get('status') == 'FAIL']
              skipped = [t for t in tests if t.find('status').get('status') not in ('PASS','FAIL')]
              status_word = 'ALL PASSING' if not failed else f'{len(failed)} FAILED'
              lines = [SEP, f"SUITE: {suite_name}  [{status_word}]", SEP]

              if passed:
                  lines.append(f"  Passed ({len(passed)}):")
                  for t in passed:
                      elapsed = float(t.find('status').get('elapsed', 0))
                      lines.append(f"    + {t.get('name')} ({elapsed:.2f}s)")

              if failed:
                  lines.append(f"\n  Failed ({len(failed)}):")
                  for t in failed:
                      st = t.find('status')
                      elapsed = float(st.get('elapsed', 0))
                      raw = (st.get('message') or '').strip() or (st.text or '').strip()
                      raw = re.sub(r'^Several failures occurred:\s*', '', raw)
                      subs = [s.strip() for s in re.split(r'\n\s*\d+\)\s+', raw) if s.strip()]
                      cat = classify(raw)
                      lines.append(f"\n    [FAIL] {t.get('name')} ({elapsed:.2f}s)")
                      lines.append(f"    Category : {cat}")
                      if len(subs) == 1:
                          lines.append(f"    Error    : {subs[0][:500]}")
                      else:
                          lines.append(f"    Errors ({len(subs)} sub-steps):")
                          for i, sf in enumerate(subs, 1):
                              lines.append(f"      {i}. {sf[:400]}")

              if skipped:
                  lines.append(f"\n  Skipped ({len(skipped)}):")
                  for t in skipped:
                      lines.append(f"    ~ {t.get('name')}")

              detail_blocks.append('\n'.join(lines))

          # ---------- Assemble final body ----------
          overall = 'ALL TESTS PASSED' if total_fail == 0 else f'{total_fail} TEST(S) FAILED'
          parts = [
              EQ,
              'API REGRESSION TEST REPORT',
              EQ,
              '',
              f'  Result   : {overall}',
              f'  Passed   : {total_pass} / {total}  ({pass_pct}%)',
              f'  Failed   : {total_fail}',
              f'  Skipped  : {total_skip}',
              f'  Run URL  : {run_url}',
              '',
              EQ,
              'SUITE SUMMARY  (P=passed  F=failed  S=skipped)',
              EQ,
              *suite_summary,
          ]
          if all_failures:
              parts += [
                  '',
                  EQ,
                  'FAILURES BY CATEGORY',
                  EQ,
                  *cat_lines,
              ]
          parts += [
              '',
              EQ,
              'DETAILED RESULTS',
              EQ,
              *detail_blocks,
              EQ,
          ]
          write('\n'.join(parts))
          PYEOF

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3.11.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: gkazakou@impact.gr
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          subject: "API Regression Test Report - ${{ needs.test.result }}"
          body: file://email_body.txt
          attachments: combined/output.xml, combined/log.html, combined/report.html