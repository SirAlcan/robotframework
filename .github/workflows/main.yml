name: Regression Tests
on:
  push:
    branches: [ main ]  # Τρέχει όταν κάνεις push στη main
  schedule:
    - cron: '0 6 * * *'  # Αυτόματο τρέξιμο κάθε μεσάνυχτα
    - cron: '0 14 * * *'
  workflow_dispatch:      # Επιτρέπει χειροκίνητο τρέξιμο

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Robot Framework Tests
        run: |
          mkdir -p results
          robot --outputdir results Automation/Hotdog.robot
      - name: Upload Test Reports
        if: always() # Θέλουμε το report ακόμα και αν αποτύχουν τα τεστ
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-reports
          path: results/
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
            server_address: smtp.gmail.com
            server_port: 465
            username: ${{ secrets.EMAIL_USERNAME }}
            password: ${{ secrets.EMAIL_PASSWORD }}
            to: ${{ secrets.EMAIL_TO }}
            from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
            subject: "🤖 Robot Framework Report - ${{ job.status }}"
            body: |
              Αποτελέσματα τεστ για το Hotdog project:
              
              ✅ Status: ${{ job.status }}
              🔗 Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            attachments: results/output.xml