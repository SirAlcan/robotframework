name: API Regression Tests

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  # ──────────────────────── 1) discover suites ────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    env:
      SUITES: |
        Automation/FNB_flows.robot
        Automation/FNB_InternalID_Cases.robot
        Automation/POS_flows.robot
        Automation/Receipts_InternalID_Cases.robot
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          raw = os.environ.get("SUITES", "").splitlines()
          suites = [s.strip() for s in raw if s.strip()]
          missing = [s for s in suites if not os.path.isfile(s)]
          if missing:
              for m in missing: print(f"ERROR: Suite not found: {m}", file=sys.stderr)
              sys.exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps({"suite": suites}) + "\n")
          PYEOF

  # ──────────────────────── 2) run each suite ─────────────────────────
  test:
    needs: discover
    if: needs.discover.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials file from secrets
        env:
          EINVOICE_API_KEY: ${{ secrets.EINVOICE_API_KEY }}
        shell: bash
        run: |
          mkdir -p config
          cat > config/credentials.py << EOF
          EINVOICE_API_KEY = "${EINVOICE_API_KEY}"
          ISSUER_VAT       = "EL154697391"
          EOF

      - id: slug
        shell: bash
        run: |
          slug=$(echo '${{ matrix.suite }}' | sed -E 's|^Automation/||; s|\.robot$||; s|[/ ]|_|g')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.suite }}
        shell: bash
        run: |
          mkdir -p results
          robot --outputdir results \
                --output output.xml --log log.html --report report.html \
                "${{ matrix.suite }}"

      - name: Upload per-suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results-${{ steps.slug.outputs.slug }}
          path: results/
          retention-days: 14

  # ──────────────────────── 3) merge + email ──────────────────────────
  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install Robot Framework
        run: pip install --upgrade pip robotframework

      - name: Download all per-suite artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: api-results-*
          merge-multiple: false

      - name: Merge results with rebot
        shell: bash
        run: |
          mkdir -p combined
          python3 - <<'PYEOF'
          import glob, subprocess, sys
          outputs = sorted(glob.glob("artifacts/**/output.xml", recursive=True))
          if not outputs:
              print("No output.xml files found.")
              sys.exit(0)
          subprocess.call([
              "rebot", "--name", "API Regression Suite",
              "--outputdir", "combined",
              "--output", "output.xml", "--log", "log.html", "--report", "report.html",
              *outputs,
          ])
          PYEOF

      # ⬇ ΝΕΟ STEP — ένα single line αντί για 200 γραμμές inline Python ⬇
      - name: Build HTML email body
        if: always()
        run: python3 scripts/build_email_html.py combined/output.xml email_body.html

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-combined-report
          path: |
            combined/
            email_body.html

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3.11.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: gkazakou@impact.gr
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          subject: "API Regression Test Report — ${{ needs.test.result }}"
          html_body: file://email_body.html       # ⬅ ΑΛΛΑΓΗ: html_body αντί για body
          attachments: combined/output.xml, combined/log.html, combined/report.html