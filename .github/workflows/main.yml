name: Regression Tests
on:
  push:
    branches: [ main ]  # Τρέχει όταν κάνεις push στη main
  schedule:
    - cron: '0 0 * * *'  # Αυτόματο τρέξιμο κάθε μεσάνυχτα
  workflow_dispatch:      # Επιτρέπει χειροκίνητο τρέξιμο

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Robot Framework Tests
      - run: |
            rm -rf results        # Διαγράφει τον παλιό φάκελο αν υπάρχει
            mkdir results         # Φτιάχνει καθαρό φάκελο
            robot --outputdir results automation/Hotdog.robot/
      - name: Upload Test Reports
        if: always() # Θέλουμε το report ακόμα και αν αποτύχουν τα τεστ
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-reports
          path: results/